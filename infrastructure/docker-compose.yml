name: chatbot-ai

# Build context is always the repo root so Dockerfiles can reference both
# frontend/ and backend/ source trees.

services:

  # ── Ollama — local LLM inference ──────────────────────────────────────────
  ollama:
    build:
      context: ..
      dockerfile: infrastructure/docker/ollama/Dockerfile
      args:
        DEFAULT_MODEL: llama3.2
    image: chatbot-ai/ollama
    container_name: chatbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Backend — .NET 8 Minimal API ──────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend/Dockerfile
    image: chatbot-ai/backend
    container_name: chatbot-backend
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ollama__BaseUrl: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5050/"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend — Vite/React served by nginx ─────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/frontend/Dockerfile
    image: chatbot-ai/frontend
    container_name: chatbot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
    name: chatbot-ollama-data
