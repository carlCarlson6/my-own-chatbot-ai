server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Proxy API requests to the backend service.
    # In Docker Compose the hostname is "backend"; in Kubernetes use the k8s service DNS.
    location /api/ {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Runtime application config generated from container environment variables.
    location = /app-config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Serve static assets with cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        sub_filter_once on;
        sub_filter '</head>' '<script src="/app-config.js"></script></head>';
        try_files $uri $uri/ /index.html;
    }
}
