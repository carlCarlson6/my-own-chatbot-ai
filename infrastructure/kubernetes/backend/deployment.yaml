apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chatbot-ai
  labels:
    app: backend
    project: my-own-chatbot-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        project: my-own-chatbot-ai
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: backend
          # Replace with your actual image registry path when pushing to a registry.
          # Example: ghcr.io/<your-org>/chatbot-ai-backend:latest
          image: chatbot-ai/backend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          ports:
            - containerPort: 5050
              name: http
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: Clerk__Authority
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: Clerk__Authority
                  optional: true
            - name: Clerk__Audience
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: Clerk__Audience
                  optional: true
            - name: Clerk__JwksUrl
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: Clerk__JwksUrl
                  optional: true
            - name: Clerk__JwtVerificationPublicKey
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: Clerk__JwtVerificationPublicKey
                  optional: true
            - name: Clerk__RequireHttpsMetadata
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: Clerk__RequireHttpsMetadata
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 5050
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: backend-data
              mountPath: /app/App_Data
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-conversations-pvc
