apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: chatbot-ai
  labels:
    app: backend
    project: my-own-chatbot-ai
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5050"
  Ollama__BaseUrl: "http://ollama:11434"
  ConversationPersistence__DatabasePath: "/app/App_Data/conversations.sqlite"
