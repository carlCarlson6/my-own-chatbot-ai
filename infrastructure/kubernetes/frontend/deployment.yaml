apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chatbot-ai
  labels:
    app: frontend
    project: my-own-chatbot-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        project: my-own-chatbot-ai
    spec:
      containers:
        - name: frontend
          # Replace with your actual image registry path when pushing to a registry.
          # Example: ghcr.io/<your-org>/chatbot-ai-frontend:latest
          image: chatbot-ai/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                configMapKeyRef:
                  name: clerk-config
                  key: CLERK_PUBLISHABLE_KEY
                  optional: true
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
