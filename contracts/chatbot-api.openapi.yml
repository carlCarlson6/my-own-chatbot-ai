openapi: 3.0.3
info:
  title: My Own Chatbot AI API
  version: 0.1.0
  description: |
    Initial chatbot API contract for the local-first chatbot application.

    This contract is the source of truth for the first scaffold and keeps the
    .NET + Orleans backend aligned with the React + Zod frontend.

    Access model for the current multi-conversation rollout:
    - anonymous clients may still create a conversation, send messages, and load
      the active conversation history for the single-chat flow
    - authenticated Clerk clients unlock saved, user-owned conversation
      management such as list, rename, delete, and reopening prior
      conversations

    Scope intentionally excluded from this version:
    - token streaming responses
    - multi-user collaboration features
servers:
  - url: http://localhost:5050
    description: Local development server
tags:
  - name: Conversations
    description: Conversation lifecycle and message exchange
paths:
  /api/conversations:
    get:
      tags: [Conversations]
      summary: List saved conversations for the authenticated user
      description: |
        Protected route for loading the signed-in user's saved conversations.

        Anonymous single-chat conversations are intentionally excluded because
        they are not persisted or managed.
      operationId: listConversations
      security:
        - clerkBearerAuth: []
      responses:
        '200':
          description: Saved conversations loaded successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags: [Conversations]
      summary: Create a new conversation
      description: |
        Anonymous-capable route for bootstrapping the current single-chat flow.

        Clients may call this endpoint without a bearer token. Authenticated
        Clerk sessions may also call it to create a persisted, user-owned
        conversation that later appears in `GET /api/conversations`.

        When no title is provided, authenticated saved conversations start as
        `New conversation` and may be auto-titled from the first user message
        until a manual rename occurs.
      operationId: createConversation
      security:
        - {}
        - clerkBearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
            examples:
              default:
                value:
                  title: Weekend planning
      responses:
        '201':
          description: Conversation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/conversations/send:
    post:
      tags: [Conversations]
      summary: Send a user message and receive an assistant reply
      description: |
        Anonymous-capable route for the active chat flow.

        Clients may call this endpoint without a bearer token. When a Clerk
        bearer token is present, later phases may use it to associate the active
        conversation with the signed-in user without changing the request shape.
      operationId: sendMessage
      security:
        - {}
        - clerkBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              existingConversation:
                value:
                  conversationId: 11111111-1111-1111-1111-111111111111
                  message:
                    content: Summarize the benefits of Orleans for chat orchestration.
              createOnFirstMessage:
                value:
                  message:
                    content: Hello, can you help me scaffold my chatbot project?
      responses:
        '200':
          description: Assistant response generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/conversations/{conversationId}:
    patch:
      tags: [Conversations]
      summary: Rename a saved conversation
      description: |
        Protected route for applying a manual title to an authenticated user's
        saved conversation.

        A successful rename marks the title as user-managed so future sends do
        not replace it with an auto-generated first-message title.
      operationId: renameConversation
      security:
        - clerkBearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique saved conversation identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameConversationRequest'
            examples:
              default:
                value:
                  title: Project kickoff notes
      responses:
        '200':
          description: Conversation renamed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSummary'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags: [Conversations]
      summary: Delete a saved conversation
      description: |
        Protected route for hard-deleting an authenticated user's saved
        conversation and its persisted message history.
      operationId: deleteConversation
      security:
        - clerkBearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique saved conversation identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Conversation deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/conversations/{conversationId}/history:
    get:
      tags: [Conversations]
      summary: Get the full ordered history for a conversation
      description: |
        Anonymous-capable route for loading the active conversation history in
        the current single-chat flow.

        Saved, user-owned conversations reuse this route for reopening
        persisted history. Those requests require a valid Clerk bearer token and
        conversation ownership; anonymous callers remain limited to non-managed
        single-chat conversations.
      operationId: getConversationHistory
      security:
        - {}
        - clerkBearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation history loaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConversationHistoryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  securitySchemes:
    clerkBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Clerk-issued bearer token used for authenticated, user-scoped
        conversation management endpoints.
  responses:
    UnauthorizedError:
      description: Missing, expired, or invalid Clerk bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            missingAuth:
              value:
                code: authentication_required
                message: Sign-in is required for this operation.
    ForbiddenError:
      description: Authenticated user is not allowed to access the requested conversation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            wrongOwner:
              value:
                code: forbidden
                message: You do not have access to this conversation.
  schemas:
    CreateConversationRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 120
          description: Optional display name for the conversation

    CreateConversationResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - title
        - hasManualTitle
        - model
        - createdAtUtc
        - updatedAtUtc
        - status
      properties:
        conversationId:
          type: string
          format: uuid
        title:
          type: string
          description: Current display title for the conversation.
        hasManualTitle:
          type: boolean
          description: Whether the current title was explicitly set by the user.
        model:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
          description: |
            Timestamp updated when the conversation is created, renamed, or
            receives persisted messages.
        status:
          $ref: '#/components/schemas/ConversationStatus'

    SendMessageRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        conversationId:
          type: string
          format: uuid
          nullable: true
          description: Optional existing conversation id; when omitted, the backend may create one.
        message:
          $ref: '#/components/schemas/ChatMessageInput'

    SendMessageResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - userMessage
        - assistantMessage
        - conversation
        - model
        - status
      properties:
        conversationId:
          type: string
          format: uuid
        userMessage:
          $ref: '#/components/schemas/ChatMessage'
        assistantMessage:
          $ref: '#/components/schemas/ChatMessage'
        conversation:
          $ref: '#/components/schemas/ConversationSummary'
        model:
          type: string
        status:
          type: string
          enum: [completed, failed]
        latencyMs:
          type: integer
          format: int32
          minimum: 0
          description: Optional server-side processing duration.

    GetConversationHistoryResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - title
        - hasManualTitle
        - model
        - createdAtUtc
        - updatedAtUtc
        - status
        - messages
      properties:
        conversationId:
          type: string
          format: uuid
        title:
          type: string
        hasManualTitle:
          type: boolean
        model:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ConversationStatus'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'

    ConversationSummary:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - title
        - hasManualTitle
        - model
        - createdAtUtc
        - updatedAtUtc
        - status
      properties:
        conversationId:
          type: string
          format: uuid
        title:
          type: string
          description: |
            Display title for the conversation. Saved conversations start as
            `New conversation` when no manual title is provided, then may be
            auto-generated from the first user message until renamed manually.
        hasManualTitle:
          type: boolean
          description: Whether the current title was explicitly set by the user.
        model:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        updatedAtUtc:
          type: string
          format: date-time
          description: |
            Timestamp updated when the conversation is created, renamed, or
            receives persisted messages.
        status:
          $ref: '#/components/schemas/ConversationStatus'

    RenameConversationRequest:
      type: object
      additionalProperties: false
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: |
            New display title for the conversation. Surrounding whitespace is
            trimmed before persistence.

    ChatMessageInput:
      type: object
      additionalProperties: false
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 8000
        clientMessageId:
          type: string
          description: Optional client-generated id for optimistic UI reconciliation.

    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - messageId
        - role
        - content
        - createdAtUtc
      properties:
        messageId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        createdAtUtc:
          type: string
          format: date-time

    MessageRole:
      type: string
      enum: [system, user, assistant]

    ConversationStatus:
      type: string
      enum: [active, idle, error]

    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        target:
          type: string
        details:
          type: array
          items:
            type: string
