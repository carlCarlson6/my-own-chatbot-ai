openapi: 3.0.3
info:
  title: My Own Chatbot AI API
  version: 0.1.0
  description: |
    Initial MVP API contract for the local-first chatbot application.

    This contract is the source of truth for the first scaffold and keeps the
    .NET + Orleans backend aligned with the React + Zod frontend.

    Scope intentionally excluded from this first version:
    - authentication and authorization
    - token streaming responses
    - persistence/database storage
    - multi-user collaboration features
servers:
  - url: http://localhost:5050
    description: Local development server
tags:
  - name: Conversations
    description: Conversation lifecycle and message exchange
  - name: Models
    description: Locally available Ollama model metadata
paths:
  /api/conversations:
    post:
      tags: [Conversations]
      summary: Create a new conversation
      operationId: createConversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
            examples:
              default:
                value:
                  title: Weekend planning
                  model: llama3.1
      responses:
        '201':
          description: Conversation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/conversations/send:
    post:
      tags: [Conversations]
      summary: Send a user message and receive an assistant reply
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              existingConversation:
                value:
                  conversationId: 11111111-1111-1111-1111-111111111111
                  model: llama3.1
                  message:
                    content: Summarize the benefits of Orleans for chat orchestration.
              createOnFirstMessage:
                value:
                  model: llama3.1
                  message:
                    content: Hello, can you help me scaffold my chatbot project?
      responses:
        '200':
          description: Assistant response generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/conversations/{conversationId}/history:
    get:
      tags: [Conversations]
      summary: Get the full ordered history for a conversation
      operationId: getConversationHistory
      parameters:
        - name: conversationId
          in: path
          required: true
          description: Unique conversation identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation history loaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConversationHistoryResponse'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/models:
    get:
      tags: [Models]
      summary: List locally available Ollama models
      operationId: listModels
      responses:
        '200':
          description: Models loaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListModelsResponse'
        '500':
          description: Unexpected server failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

components:
  schemas:
    CreateConversationRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 120
          description: Optional display name for the conversation
        model:
          type: string
          description: Preferred Ollama model for the conversation

    CreateConversationResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - title
        - model
        - createdAtUtc
        - status
      properties:
        conversationId:
          type: string
          format: uuid
        title:
          type: string
        model:
          type: string
        createdAtUtc:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/ConversationStatus'

    SendMessageRequest:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        conversationId:
          type: string
          format: uuid
          nullable: true
          description: Optional existing conversation id; when omitted, the backend may create one.
        model:
          type: string
          description: Optional model override for this request.
        message:
          $ref: '#/components/schemas/ChatMessageInput'

    SendMessageResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - userMessage
        - assistantMessage
        - model
        - status
      properties:
        conversationId:
          type: string
          format: uuid
        userMessage:
          $ref: '#/components/schemas/ChatMessage'
        assistantMessage:
          $ref: '#/components/schemas/ChatMessage'
        model:
          type: string
        status:
          type: string
          enum: [completed, failed]
        latencyMs:
          type: integer
          format: int32
          minimum: 0
          description: Optional server-side processing duration.

    GetConversationHistoryResponse:
      type: object
      additionalProperties: false
      required:
        - conversationId
        - title
        - model
        - status
        - messages
      properties:
        conversationId:
          type: string
          format: uuid
        title:
          type: string
        model:
          type: string
        status:
          $ref: '#/components/schemas/ConversationStatus'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'

    ListModelsResponse:
      type: object
      additionalProperties: false
      required:
        - models
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelSummary'

    ModelSummary:
      type: object
      additionalProperties: false
      required:
        - name
        - displayName
        - isDefault
      properties:
        name:
          type: string
        displayName:
          type: string
        isDefault:
          type: boolean
        description:
          type: string

    ChatMessageInput:
      type: object
      additionalProperties: false
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 8000
        clientMessageId:
          type: string
          description: Optional client-generated id for optimistic UI reconciliation.

    ChatMessage:
      type: object
      additionalProperties: false
      required:
        - messageId
        - role
        - content
        - createdAtUtc
      properties:
        messageId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        createdAtUtc:
          type: string
          format: date-time

    MessageRole:
      type: string
      enum: [system, user, assistant]

    ConversationStatus:
      type: string
      enum: [active, idle, error]

    ApiError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        target:
          type: string
        details:
          type: array
          items:
            type: string
