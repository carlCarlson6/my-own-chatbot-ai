name: PR CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  check-secrets:
    name: Check Exposed Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files for exposed secrets
        run: |
          chmod +x .github/hooks/secrets-scanner/scan-secrets.sh
          SCAN_MODE=block \
          SCAN_SCOPE=range \
          SCAN_RANGE="${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
          .github/hooks/secrets-scanner/scan-secrets.sh

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: check-secrets
    defaults:
      run:
        working-directory: backend/src
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore MyOwnChatbotAi.sln

      - name: Build
        run: dotnet build MyOwnChatbotAi.sln --no-restore --configuration Release

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: check-secrets
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
